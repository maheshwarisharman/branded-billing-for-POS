appId: com.billdrop.agent
productName: BillDrop Agent
copyright: Copyright © 2024 BillDrop

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - src/settings/**/*
  - assets/**/*
  - package.json
  - node_modules/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico
  artifactName: BillDrop-Agent-Setup-${version}.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: false
  createStartMenuShortcut: true
  runAfterFinish: true
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: assets/icon.icns
  category: public.app-category.business
  darkModeSupport: true
  artifactName: BillDrop-Agent-${version}.dmg

dmg:
  title: BillDrop Agent
  background: assets/dmg-background.png
  window:
    width: 600
    height: 400

linux:
  target: AppImage
  icon: assets/icon.png
  category: Office

publish: null
